<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="start-session.css" />
    <title>Pig Game - Enter Session</title>
  </head>
  <body>
    <div class="session-container">
      <h2>Pig Game</h2>
      <p class="subtitle">Enter your user/email to start a session</p>
      <input type="text" id="input-user" placeholder="user id" />
      <button id="btn-enter" class="btn">Enter Session</button>
      <p id="session-error" class="error hidden">Invalid user/email or server error.</p>
    </div>
    <script src="start-session.js"></script>
  </body>
</html>
